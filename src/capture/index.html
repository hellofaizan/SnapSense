<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>SnapSense capture</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: crosshair;
        user-select: none;
      }
      #bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 0;
      }
      #sel {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      #hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        top: auto;
        z-index: 2;
        font: 13px/1.4 system-ui, Segoe UI, sans-serif;
        color: #f5f5f5;
        background: rgba(10, 10, 10, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 14px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>
    <canvas id="sel"></canvas>
    <div id="hint">Drag to select region · Esc to cancel</div>
    <script src="capture.js"></script>
  </body>
</html>
